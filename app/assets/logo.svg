<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="glow" x1="24" y1="0" x2="24" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67e8f9" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#0284c7" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="48" height="48" rx="13" fill="url(#bg)"/>
  <rect width="48" height="48" rx="13" fill="url(#glow)"/>
  <!-- Microphone body -->
  <rect x="19" y="9" width="10" height="17" rx="5" fill="white"/>
  <!-- Microphone arc -->
  <path d="M13 24c0 6.075 4.925 11 11 11s11-4.925 11-11" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- Stand -->
  <line x1="24" y1="35" x2="24" y2="40" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="18" y1="40" x2="30" y2="40" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Sound waves right -->
  <path d="M37 20c1.5 2 1.5 6 0 8" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.65" fill="none"/>
  <path d="M40.5 17.5c2.5 3.5 2.5 9.5 0 13" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.35" fill="none"/>
</svg>
