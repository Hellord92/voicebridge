name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ── macOS DMG ───────────────────────────────────────────────────────────────
  build-mac:
    name: macOS DMG
    runs-on: macos-14  # Apple Silicon runner

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: brew install cmake portaudio

      - name: Build CoreAudio driver
        run: |
          cd drivers/macos
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Build C++ native addon
        working-directory: core
        run: npm install && npm run build

      - name: Build Electron app
        working-directory: app
        env:
          CSC_LINK:     ${{ secrets.MAC_CERT_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_ID:     ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          TEAM_ID:      ${{ secrets.APPLE_TEAM_ID }}
          VITE_FIREBASE_API_KEY:            ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:        ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:         ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:     ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:             ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          npm install
          npm run build

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceBridge-mac
          path: app/dist/*.dmg

  # ── Windows EXE ─────────────────────────────────────────────────────────────
  build-win:
    name: Windows EXE
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install PortAudio (vcpkg)
        run: |
          vcpkg install portaudio:x64-windows
          echo "VCPKG_ROOT=C:/vcpkg" >> $env:GITHUB_ENV

      - name: Build C++ native addon
        working-directory: core
        run: npm install && npm run build

      - name: Build Electron app + NSIS installer
        working-directory: app
        env:
          WIN_CSC_LINK:         ${{ secrets.WIN_CERT_BASE64 }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
          VITE_FIREBASE_API_KEY:            ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:        ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:         ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:     ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:             ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          npm install
          npm run build
          # Build NSIS installer
          cd ../drivers/windows
          makensis installer.nsi

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceBridge-win
          path: |
            app/dist/*.exe
            drivers/windows/VoiceBridgeSetup-*.exe

  # ── GitHub Release ──────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with: { name: VoiceBridge-mac, path: dist/ }

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with: { name: VoiceBridge-win, path: dist/ }

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/VoiceBridge.dmg
            dist/VoiceBridge-Setup.exe
          name: VoiceBridge ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
