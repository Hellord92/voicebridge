name: Deploy Server to Railway

on:
  push:
    branches: [main]
    paths:    ['server/**']
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy FastAPI server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify server syntax
        run: |
          python3 -m py_compile server/main.py server/config.py
          echo "✓ Server syntax OK — Railway auto-deploys from GitHub push"

      - name: Deploy via Railway CLI (optional — needs RAILWAY_TOKEN secret)
        if: ${{ env.RAILWAY_TOKEN != '' }}
        working-directory: server
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm i -g @railway/cli
          railway up --service voicebridge-api --detach
        continue-on-error: true
